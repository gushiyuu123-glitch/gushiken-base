  <!-- Google Analytics (GA4) - self exclude (secret + url scrub) -->
  <script>
    (function () {
      const KEY = "__gd_internal__";
      const qs = new URLSearchParams(location.search);

      // 🔒 必ず変えろ：自分だけ知ってる長いランダム文字列
      const SECRET = "CHANGE_ME_TO_LONG_RANDOM";

      // internalフラグのON/OFF（端末ブラウザ単位）
      if (qs.get("internal") === "1" && qs.get("k") === SECRET) localStorage.setItem(KEY, "1");
      if (qs.get("internal") === "0") localStorage.removeItem(KEY);

      // ✅ URLから internal/k を消す（共有事故・ログ露出を殺す）
      if (qs.has("internal") || qs.has("k")) {
        qs.delete("internal");
        qs.delete("k");
        const rest = qs.toString();
        const clean = location.pathname + (rest ? `?${rest}` : "") + location.hash;
        history.replaceState(null, "", clean);
      }

      // ✅ internal時でもアプリが落ちないように、gtagだけは常に定義しておく
      window.dataLayer = window.dataLayer || [];
      window.gtag = window.gtag || function(){ window.dataLayer.push(arguments); };

      // internal端末はGAを一切ロードしない（= 計測されない）
      if (localStorage.getItem(KEY) === "1") return;

      const GA_ID = "G-NM83YP0V4Q";

      // ✅ 二重ロード防止（保険）
      if (!document.querySelector('script[src^="https://www.googletagmanager.com/gtag/js?id="]')) {
        const s = document.createElement("script");
        s.async = true;
        s.src = "https://www.googletagmanager.com/gtag/js?id=" + GA_ID;
        document.head.appendChild(s);
      }

      gtag("js", new Date());

      // SPA手動page_view前提：自動送信は止める（君の運用を維持）
      gtag("config", GA_ID, { send_page_view: false });
    })();
  </script>
