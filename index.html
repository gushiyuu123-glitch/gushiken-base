  <!-- Root reveal failsafe -->

    window.addEventListener("DOMContentLoaded", function () {
      requestAnimationFrame(function () {
        var root = document.getElementById("root");
        if (root) root.classList.add("show");
      });
    });

    window.setTimeout(function () {
      var root = document.getElementById("root");
      if (root) root.classList.add("show");
    }, 1200);
  </script>
