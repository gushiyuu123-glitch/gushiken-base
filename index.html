  <!-- Google Analytics (GA4) - self exclude (secret + url scrub) -->
  <script>
    (function () {
      const KEY = "__gd_internal__";
      const qs = new URLSearchParams(location.search);
      const SECRET = "CHANGE_ME_TO_LONG_RANDOM";

      const safeLS = {
        get(k){ try { return localStorage.getItem(k); } catch { return null; } },
        set(k,v){ try { localStorage.setItem(k,v); } catch {} },
        del(k){ try { localStorage.removeItem(k); } catch {} },
      };

      if (qs.get("internal") === "1" && qs.get("k") === SECRET) safeLS.set(KEY, "1");
      if (qs.get("internal") === "0") safeLS.del(KEY);

      if (qs.has("internal") || qs.has("k")) {
        qs.delete("internal"); qs.delete("k");
        const rest = qs.toString();
        const clean = location.pathname + (rest ? `?${rest}` : "") + location.hash;
        history.replaceState(null, "", clean);
      }

      window.dataLayer = window.dataLayer || [];
      window.gtag = window.gtag || function(){ window.dataLayer.push(arguments); };

      if (safeLS.get(KEY) === "1") return;

      const GA_ID = "G-NM83YP0V4Q";
      if (!document.querySelector('script[src^="https://www.googletagmanager.com/gtag/js?id="]')) {
        const s = document.createElement("script");
        s.async = true;
        s.src = "https://www.googletagmanager.com/gtag/js?id=" + GA_ID;
        document.head.appendChild(s);
      }
      gtag("js", new Date());
      gtag("config", GA_ID, { send_page_view: false });
    })();
  </script>
